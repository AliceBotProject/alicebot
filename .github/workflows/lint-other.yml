name: Lint Other Files

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.py'
  pull_request:
    paths-ignore:
      - '**.py'
  workflow_dispatch:

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - run: bun run prettier

  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - run: bun run eslint

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - run: bun run markdownlint
